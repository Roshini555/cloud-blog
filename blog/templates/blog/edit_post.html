{% extends 'blog/base.html' %}

{% block content %}
    <div class="row justify-content-center mt-4">
        <div class="col-md-8">
            <div class="card shadow-lg border-0 rounded-4" style="background: rgba(15, 23, 42, 0.8);">
                <div class="card-header border-bottom-0 pt-4 pb-0 text-center bg-transparent">
                    <h3 class="mb-0 fw-bold text-white">
                        <i class="bi bi-pencil-square me-2" style="color: #f59e0b;"></i>Edit Post
                    </h3>
                </div>
                <div class="card-body p-5">
                    
                    <form method="post" enctype="multipart/form-data" class="text-white">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <div class="mt-4 pt-2">
                            <button type="submit" class="btn btn-warning rounded-pill px-4 me-2 shadow fw-bold">Update Post</button>
                            <a href="{% url 'post_detail' post.id %}" class="btn btn-outline-secondary rounded-pill px-4 text-white">Cancel</a>
                        </div>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
{% endblock %}
