<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Blog</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        /* Dark Animated Background & Typography */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #090a0f, #1a1c29, #0f172a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dark Glassmorphism Navbar */
        .navbar-glass {
            background: rgba(15, 23, 42, 0.7) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Glowing Text Effect */
        .navbar-brand {
            font-weight: 700;
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        .nav-link, .navbar-text { color: #cbd5e1 !important; font-weight: 600; }

        /* Dark Glass Cards with Neon Hover */
        .card, article {
            background: rgba(30, 41, 59, 0.6) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: #f8fafc;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.15) !important;
            border-color: rgba(56, 189, 248, 0.4) !important;
        }

        .card-title a { color: #f8fafc !important; transition: color 0.2s; }
        .card-title a:hover { color: #38bdf8 !important; }

        /* Glowing Buttons */
        .btn-custom {
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            color: #fff;
            border: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            color: #fff;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        /* Fix Form Inputs for Dark Mode */
        .form-control, .form-control:focus {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #f8fafc;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25);
            border-color: #38bdf8;
        }

        /* Page Layout Animations */
        main { flex: 1; animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.5);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-glass sticky-top mb-5 py-3">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="bi bi-code-slash me-2"></i>Cloud Blog
            </a>
            
            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-4 d-none d-md-block">
                        <i class="bi bi-person-circle me-1"></i> {{ user.username }}
                    </span>
                    <a href="{% url 'create_post' %}" class="btn btn-custom btn-sm me-3 px-3 rounded-pill">
                        <i class="bi bi-pencil-square me-1"></i> Write
                    </a>
                    <form method="post" action="{% url 'logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm rounded-pill px-3">Log Out</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-custom px-4 rounded-pill me-3">Log In</a>
                    <a href="{% url 'register' %}" class="btn btn-custom px-4 rounded-pill">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-4 text-center mt-auto">
        <div class="container text-muted small">
            <p class="mb-0">&copy; 2026 Cloud Blog. Built with Django.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
